<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Offer Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow-lg border-0">

<div class="card-header bg-success text-white">

<h3>
<i class="bi bi-award-fill"></i>
Offer Management
</h3>

</div>

<div class="card-body">

<form th:action="@{/offers/save}"
      th:object="${offer}"
      method="post">

<input type="hidden" th:field="*{id}">
<div class="row">

<!-- Candidate -->
<div class="col-md-4 mb-3">

<label class="form-label">
Candidate
</label>

<select class="form-select"
        th:field="*{candidateName}"
        required>

<option value="">
Select Candidate
</option>

<option
th:each="candidate : ${candidates}"
th:value="${candidate.fullName}"
th:text="${candidate.fullName}">
</option>

</select>

</div>

<!-- Candidate Email -->
<div class="col-md-4 mb-3">

<label class="form-label">
Candidate Email
</label>

<input
type="email"
class="form-control"
th:field="*{candidateEmail}"
placeholder="candidate@gmail.com"
required>

</div>

<!-- Job Title -->
<div class="col-md-4 mb-3">

<label class="form-label">
Job Title
</label>

<input
type="text"
class="form-control"
th:field="*{jobTitle}"
placeholder="Java Full Stack Developer"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Offer Date
</label>

<input
type="date"
class="form-control"
th:field="*{offerDate}"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Joining Date
</label>

<input
type="date"
class="form-control"
th:field="*{joiningDate}"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Salary Package
</label>

<input
type="text"
class="form-control"
th:field="*{salaryPackage}"
placeholder="₹6 LPA"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Offer Status
</label>

<select
class="form-select"
th:field="*{status}">

<option value="Pending">
Pending
</option>

<option value="Accepted">
Accepted
</option>

<option value="Rejected">
Rejected
</option>

</select>

</div>

</div>

<div class="text-center">

<button
type="submit"
class="btn btn-success btn-lg">

<i class="bi bi-check-circle"></i>

<span
th:text="${offer.id==null} ? 'Generate Offer' : 'Update Offer'">
</span>

</button>

<a href="/offers"
class="btn btn-secondary btn-lg">

<i class="bi bi-arrow-left"></i>
Back

</a>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
