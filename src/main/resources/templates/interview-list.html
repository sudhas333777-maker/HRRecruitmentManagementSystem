<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Interview List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Interview List</h2>

<div class="mb-3">
    <a href="/interviews/add" class="btn btn-primary">
        Schedule Interview
    </a>
</div>

<form th:action="@{/interviews/search}" method="get" class="mb-3">

<div class="input-group">

<input
type="text"
name="keyword"
class="form-control"
placeholder="Search Candidate">

<button class="btn btn-success">
Search
</button>

</div>

</form>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>S.No.</th>
<th>Candidate</th>
<th>Job Title</th>
<th>Interviewer</th>
<th>Date</th>
<th>Time</th>
<th>Mode</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="interview, stat : ${interviews}">

<td th:text="${stat.count}"></td>

<td th:text="${interview.candidateName}"></td>

<td th:text="${interview.jobTitle}"></td>

<td th:text="${interview.interviewer}"></td>

<td th:text="${interview.interviewDate}"></td>

<td th:text="${interview.interviewTime}"></td>

<td th:text="${interview.interviewMode}"></td>

<td>
<span class="badge bg-primary"
      th:text="${interview.status}">
</span>
</td>

<td>

<a th:href="@{/interviews/edit/{id}(id=${interview.id})}"
   class="btn btn-warning btn-sm">
Edit
</a>

<a th:href="@{/interviews/delete/{id}(id=${interview.id})}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Delete this interview?')">
Delete
</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
