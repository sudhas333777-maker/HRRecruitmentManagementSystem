<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard | HR Recruitment Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar">

        <h3 class="text-center mt-3 text-white">
            HRMS
        </h3>

        <a href="/dashboard">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="/jobs"
   th:if="${session.role == 'ADMIN' or session.role == 'HR'}">

    <i class="bi bi-briefcase"></i>
    Jobs

</a>

        <a href="/candidates"
   th:if="${session.role == 'ADMIN' or session.role == 'HR' or session.role == 'RECRUITER'}">

    <i class="bi bi-people"></i>
    Candidates

</a>

        <a href="/interviews"
   th:if="${session.role == 'ADMIN' or session.role == 'HR' or session.role == 'RECRUITER'}">

    <i class="bi bi-calendar-event"></i>
    Interviews

</a>

        <a href="/offers"
   th:if="${session.role == 'ADMIN' or session.role == 'HR'}">

    <i class="bi bi-award"></i>
    Offers

</a>

        <a href="/">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>

    </div>

    <!-- Main Content -->

    <div class="content">

        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm rounded">

            <div class="container-fluid">

                <h4 class="fw-bold">
                    Dashboard
                </h4>

                <span class="fw-bold">

Welcome
<span th:text="${loggedUser.fullName}">
User
</span>

</span>

<br>

<small class="text-muted">

Role:
<span th:text="${loggedUser.role}">
</span>

</small>

            </div>

        </nav>

        <div class="row mt-4">

            <div class="col-md-3">

                <div class="card card-blue">

                    <h5>Total Jobs</h5>

                    <h2 th:text="${jobCount}"></h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card card-green">

                    <h5>Total Candidates</h5>

                    <<h2 th:text="${candidateCount}"></h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card card-orange">

                    <h5>Interviews</h5>

                    <h2 th:text="${interviewCount}"></h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card card-red">

                    <h5>Selected</h5>

                    <h2 th:text="${selectedCount}"></h2>

                </div>

            </div>

        </div>

        <div class="card shadow mt-4 p-4">

            <h4>
                Recruitment Overview
            </h4>

            <canvas id="myChart"></canvas>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

const jobCount = /*[[${jobCount}]]*/ 0;
const candidateCount = /*[[${candidateCount}]]*/ 0;
const interviewCount = /*[[${interviewCount}]]*/ 0;
const selectedCount = /*[[${selectedCount}]]*/ 0;

const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Jobs', 'Candidates', 'Interviews', 'Selected'],
        datasets: [{
            label: 'HR Statistics',
            data: [
                jobCount,
                candidateCount,
                interviewCount,
                selectedCount
            ]
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>
</script>

</body>

</html>
