<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Candidate List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="d-flex justify-content-between mb-3">

<h3>Candidate List</h3>

<div>

<a
href="/candidates/add"
class="btn btn-success">

Register Candidate

</a>

<a
href="/candidates/export/pdf"
class="btn btn-danger">

Export PDF

</a>

</div>

</div>

<div class="row mb-3">

<div class="col-md-6">

<form th:action="@{/candidates/search}" method="get">

<div class="input-group">

<input
type="text"
name="keyword"
class="form-control"
placeholder="Search Candidate">

<button class="btn btn-primary">

Search

</button>

</div>

</form>

</div>

</div>

<table class="table table-hover table-bordered shadow">

<thead class="table-dark">

<tr>

<th>S.No.</th>

<th>Name</th>

<th>Email</th>

<th>Phone</th>

<th>Applied Job</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="candidate, stat : ${candidates}">

<td th:text="${currentPage * 10 + stat.count}"></td>

<td th:text="${candidate.fullName}"></td>

<td th:text="${candidate.email}"></td>

<td th:text="${candidate.phone}"></td>

<td th:text="${candidate.appliedJob}"></td>

<td>

<span
class="badge bg-success"
th:text="${candidate.status}">
</span>

</td>

<td>

<a
th:href="@{/candidates/edit/{id}(id=${candidate.id})}"
class="btn btn-warning btn-sm">

Edit

</a>

<a
th:href="@{/candidates/delete/{id}(id=${candidate.id})}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this candidate?')">

Delete

</a>

</td>

</tr>

</tbody>

</table>

<!-- Pagination -->

<nav aria-label="Candidate Pagination" class="mt-4">

    <ul class="pagination justify-content-center">

        <!-- Previous -->

        <li class="page-item"
            th:classappend="${currentPage==0} ? 'disabled'">

            <a class="page-link"
               th:href="@{/candidates(page=${currentPage-1})}">

                Previous

            </a>

        </li>

        <!-- Page Numbers -->

        <li class="page-item"
            th:each="i : ${#numbers.sequence(0,totalPages-1)}"
            th:classappend="${currentPage==i} ? 'active'">

            <a class="page-link"
               th:href="@{/candidates(page=${i})}"
               th:text="${i+1}">
            </a>

        </li>

        <!-- Next -->

        <li class="page-item"
            th:classappend="${currentPage==totalPages-1} ? 'disabled'">

            <a class="page-link"
               th:href="@{/candidates(page=${currentPage+1})}">

                Next

            </a>

        </li>

    </ul>

</nav>

</div>

</body>

</html>
