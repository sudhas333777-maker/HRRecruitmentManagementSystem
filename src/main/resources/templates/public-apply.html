<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Apply Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Job Application</h3>

</div>

<div class="card-body">

<form th:action="@{/apply/save}"
      th:object="${candidate}"
      method="post">

<div class="mb-3">

<label>Full Name</label>

<input
class="form-control"
th:field="*{fullName}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
th:field="*{email}"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
class="form-control"
th:field="*{phone}"
required>

</div>

<div class="mb-3">

<label>Qualification</label>

<input
class="form-control"
th:field="*{qualification}"
required>

</div>

<div class="mb-3">

<label>Skills</label>

<input
class="form-control"
th:field="*{skills}"
placeholder="Java, Spring Boot">

</div>

<div class="mb-3">

<label>Applied Job</label>

<input
class="form-control"
th:field="*{appliedJob}"
readonly>

</div>

<button
class="btn btn-success">

Apply

</button>

</form>

</div>

</div>

</div>

</body>

</html>
