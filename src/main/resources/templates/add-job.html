<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Add Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Add New Job</h3>

</div>

<div class="card-body">

<form th:action="@{/jobs/save}" th:object="${job}" method="post">

<div class="row">

<div class="col-md-6 mb-3">

<label>Job Title</label>

<input type="text" class="form-control" th:field="*{jobTitle}" required>

</div>

<div class="col-md-6 mb-3">

<label>Department</label>

<input type="text" class="form-control" th:field="*{department}" required>

</div>

<div class="col-md-6 mb-3">

<label>Location</label>

<input type="text" class="form-control" th:field="*{location}">

</div>

<div class="col-md-6 mb-3">

<label>Employment Type</label>

<select class="form-select" th:field="*{employmentType}">

    <option value="">Select Employment Type</option>
    <option value="Full Time">Full Time</option>
    <option value="Part Time">Part Time</option>
    <option value="Internship">Internship</option>
    <option value="Contract">Contract</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Experience</label>

<input class="form-control" th:field="*{experience}">

</div>

<div class="col-md-6 mb-3">

<label>Salary</label>

<input class="form-control" th:field="*{salary}">

</div>

<div class="col-md-6 mb-3">

<label>Vacancies</label>

<input type="number" class="form-control" th:field="*{vacancies}">

</div>

<div class="col-md-6 mb-3">

<label>Last Date</label>

<input type="date" class="form-control" th:field="*{lastDate}">

</div>

<div class="mb-3">

<label>Description</label>

<textarea class="form-control" rows="4" th:field="*{description}"></textarea>

</div>

<div class="mb-3">

<label>Status</label>

<select class="form-select" th:field="*{status}">

    <option value="">Select Status</option>
    <option value="Active">Active</option>
    <option value="Closed">Closed</option>

</select>

</div>

<button type="submit" class="btn btn-success"
        th:text="${job.id == null} ? 'Save Job' : 'Update Job'">
</button>

<a href="/jobs" class="btn btn-secondary">

View Jobs

</a>

</form>

</div>

</div>

</div>

</body>

</html>
