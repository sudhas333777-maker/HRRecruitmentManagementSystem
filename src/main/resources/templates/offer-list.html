<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Offer List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>
<i class="bi bi-award-fill"></i>
Offer List
</h3>

</div>

<div class="card-body">

<div class="row mb-3">

<div class="col-md-6">

<a href="/offers/add" class="btn btn-success">

<i class="bi bi-plus-circle"></i>

Generate Offer

</a>

</div>

<div class="col-md-6">

<form th:action="@{/offers/search}" method="get">

<div class="input-group">

<input
type="text"
name="keyword"
class="form-control"
placeholder="Search Candidate">

<button class="btn btn-primary">

Search

</button>

</div>

</form>

</div>

</div>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>S.No.</th>

<th>Candidate</th>

<th>Job Title</th>

<th>Offer Date</th>

<th>Joining Date</th>

<th>Salary</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="offer, stat : ${offers}">

<td th:text="${stat.count}"></td>

<td th:text="${offer.candidateName}"></td>

<td th:text="${offer.jobTitle}"></td>

<td th:text="${offer.offerDate}"></td>

<td th:text="${offer.joiningDate}"></td>

<td th:text="${offer.salaryPackage}"></td>

<td>

<span
th:if="${offer.status=='Pending'}"
class="badge bg-warning text-dark">

Pending

</span>

<span
th:if="${offer.status=='Accepted'}"
class="badge bg-success">

Accepted

</span>

<span
th:if="${offer.status=='Rejected'}"
class="badge bg-danger">

Rejected

</span>

</td>

<td>

<a
th:href="@{/offers/edit/{id}(id=${offer.id})}"
class="btn btn-warning btn-sm">

Edit

</a>

<a
th:href="@{/offers/delete/{id}(id=${offer.id})}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this offer?')">

Delete

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
