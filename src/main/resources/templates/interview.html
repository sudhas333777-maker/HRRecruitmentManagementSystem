<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Interview Scheduling</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/dashboard.css}">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow-lg border-0">

<div class="card-header bg-primary text-white">

<h3>
<i class="bi bi-calendar-event"></i>
Interview Scheduling
</h3>

</div>

<div class="card-body">

<form th:action="@{/interviews/save}"
      th:object="${interview}"
      method="post">

<input type="hidden" th:field="*{id}">

<!-- Row 1 -->
<div class="row">

<div class="col-md-4 mb-3">

<label class="form-label">
Candidate
</label>

<select class="form-select"
        th:field="*{candidateName}"
        required>

<option value="">Select Candidate</option>

<option
th:each="candidate : ${candidates}"
th:value="${candidate.fullName}"
th:text="${candidate.fullName}">
</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">
Candidate Email
</label>

<input
type="email"
class="form-control"
th:field="*{candidateEmail}"
placeholder="candidate@gmail.com"
required>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">
Job Title
</label>

<input
type="text"
class="form-control"
th:field="*{jobTitle}"
placeholder="Java Full Stack Developer"
required>

</div>

</div>

<!-- Row 2 -->
<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Interviewer
</label>

<input
type="text"
class="form-control"
th:field="*{interviewer}"
placeholder="Mr. Rajesh Kumar"
required>

</div>

<div class="col-md-3 mb-3">

<label class="form-label">
Interview Date
</label>

<input
type="date"
class="form-control"
th:field="*{interviewDate}"
required>

</div>

<div class="col-md-3 mb-3">

<label class="form-label">
Interview Time
</label>

<input
type="time"
class="form-control"
th:field="*{interviewTime}"
required>

</div>

</div>

<!-- Row 3 -->
<div class="row">

<div class="col-md-4 mb-3">

<label class="form-label">
Interview Mode
</label>

<select
class="form-select"
th:field="*{interviewMode}">

<option value="Online">Online</option>

<option value="Offline">Offline</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">
Meeting Link / Location
</label>

<input
type="text"
class="form-control"
th:field="*{interviewLocation}"
placeholder="Google Meet link or Office Address Location">

</div>

<div class="col-md-4 mb-3">

<label class="form-label">
Status
</label>

<select
class="form-select"
th:field="*{status}">

<option value="Scheduled">Scheduled</option>

<option value="Completed">Completed</option>

<option value="Cancelled">Cancelled</option>

</select>

</div>

</div>

<!-- Buttons -->
<div class="text-center">

<button type="submit" class="btn btn-success btn-lg">
<i class="bi bi-check-circle"></i>
<span th:text="${interview.id == null} ? 'Schedule Interview' : 'Update Interview'"></span>
</button>

<a
href="/interviews"
class="btn btn-secondary btn-lg">

<i class="bi bi-arrow-left"></i>
Back

</a>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
