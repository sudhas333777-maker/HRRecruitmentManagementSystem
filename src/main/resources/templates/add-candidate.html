<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Register Candidate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

<div class="card shadow-lg">

<div class="card-header bg-success text-white">

<h3>

<i class="bi bi-person-plus-fill"></i>

Candidate Registration

</h3>

</div>

<div class="card-body">

<form
th:action="@{/candidates/save}"
th:object="${candidate}"
method="post">

<input type="hidden" th:field="*{id}">

<div class="row">

<div class="col-md-6 mb-3">

<label>Full Name</label>

<input
class="form-control"
th:field="*{fullName}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
th:field="*{email}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Phone</label>

<input
class="form-control"
th:field="*{phone}">

</div>

<div class="col-md-6 mb-3">

<label>Gender</label>

<select
class="form-select"
th:field="*{gender}">

<option value="">Select</option>

<option value="Male">Male</option>

<option value="Female">Female</option>

<option value="Other">Other</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Qualification</label>

<input
class="form-control"
th:field="*{qualification}"
placeholder="B.Tech IT">

</div>

<div class="col-md-6 mb-3">

<label>Experience</label>

<input
class="form-control"
th:field="*{experience}"
placeholder="0-2 Years">

</div>

<div class="col-md-6 mb-3">

<label>Skills</label>

<input
class="form-control"
th:field="*{skills}"
placeholder="Java, Spring Boot">

</div>

<div class="col-md-6 mb-3">

<label>Applied Job</label>

<select
class="form-select"
th:field="*{appliedJob}">

<option value="">Select Job</option>

<option
th:each="job : ${jobs}"
th:value="${job.jobTitle}"
th:text="${job.jobTitle}">

</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Expected Salary</label>

<input
class="form-control"
th:field="*{expectedSalary}"
placeholder="₹5 LPA">

</div>

<div class="col-md-6 mb-3">

<label>Status</label>

<select
class="form-select"
th:field="*{status}">

<option value="Applied">Applied</option>

<option value="Shortlisted">Shortlisted</option>

<option value="Rejected">Rejected</option>

<option value="Selected">Selected</option>

</select>

</div>

</div>

<hr>

<div class="text-end">

<button
type="reset"
class="btn btn-warning">

Reset

</button>


<a
href="/candidates"
class="btn btn-secondary">

<i class="bi bi-arrow-left"></i>
Back

</a>


<button 
type="submit" 
class="btn btn-success"
th:text="${candidate.id == null} ? 'Register Candidate' : 'Update Candidate'">
</button>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
